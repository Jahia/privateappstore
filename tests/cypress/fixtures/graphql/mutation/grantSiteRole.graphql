mutation GrantSiteRole(
    $siteKey: String!
    $role: String!
    $principalName: String!
    $principalType: ForgePrincipalType!
) {
    forge {
        grantRole(
            siteKey: $siteKey
            role: $role
            principalName: $principalName
            principalType: $principalType
        )
    }
}
