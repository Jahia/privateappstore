mutation UpdateForgeBranding(
    $siteKey: String!
    $logo: String
    $copyright: String
    $privacyUrl: String
) {
    forge {
        updateSettings(siteKey: $siteKey, settings: {logo: $logo, copyright: $copyright, footerLinks: {privacyUrl: $privacyUrl}}) {
            siteKey
            copyright
            footerLinks {
                privacyUrl
            }
            logoPath
        }
    }
}
