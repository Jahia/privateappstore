mutation UpdateForgeBranding(
    $siteKey: String!
    $logo: String
    $copyright: String
    $privacyUrl: String
) {
    updateForgeSettings(siteKey: $siteKey, settings: {logo: $logo, copyright: $copyright, footerLinks: {privacyUrl: $privacyUrl}}) {
        siteKey
        copyright
        privacyUrl
        logoPath
    }
}
