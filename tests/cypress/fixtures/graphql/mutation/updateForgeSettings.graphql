mutation UpdateForgeSettings(
    $siteKey: String!
    $url: String
    $id: String
    $user: String
    $password: String
) {
    forge {
        updateSettings(
            siteKey: $siteKey
            settings: {url: $url, id: $id, user: $user, password: $password}
        ) {
            siteKey
            url
            id
            user
            passwordSet
        }
    }
}
