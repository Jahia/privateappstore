query ForgeCategorySettings($siteKey: String!) {
    forgeCategorySettings(siteKey: $siteKey) {
        siteKey
        rootCategoryUuid
        rootCategoryPath
        rootCategoryDisplayName
        siteLanguages
        categories {
            uuid
            name
            displayName
            titles {
                language
                title
            }
            usages
        }
    }
}
