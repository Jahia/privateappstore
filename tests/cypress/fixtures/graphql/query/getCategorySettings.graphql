query ForgeCategorySettings($siteKey: String!) {
    forge {
        categorySettings(siteKey: $siteKey) {
            siteKey
            rootCategoryUuid
            rootCategoryPath
            rootCategoryDisplayName
            siteLanguages
            categories {
                uuid
                name
                displayName
                titles {
                    language
                    title
                }
                usages
            }
        }
    }
}
